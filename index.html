<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chandler Sedat</title>
  <meta name="description" content="Musician. Denver, CO." />

  <!-- Open Graph (what shows when links are pasted into iMessage, Instagram, etc.) -->
  <meta property="og:title" content="Chandler Sedat" />
  <meta property="og:description" content="Musician. Denver, CO." />
  <meta property="og:type" content="website" />
  <!-- TODO: swap for real og image once uploaded -->
  <meta property="og:image" content="/og.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..700,0..100,0..1&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #1E2924;
      --bg-soft: #253430;
      --ink: #F0EBDD;
      --ink-muted: #8B8878;
      --accent: #D4A24C;
      --hairline: rgba(240, 235, 221, 0.12);
      --hairline-strong: rgba(240, 235, 221, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    body {
      padding: 40px 24px 60px;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
    }

    /* --- Header --- */
    .header { margin-bottom: 40px; }

    .name {
      font-family: 'Fraunces', serif;
      font-variation-settings: "SOFT" 30, "WONK" 1;
      font-weight: 400;
      font-size: clamp(56px, 14vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    .name em {
      font-style: italic;
      font-variation-settings: "SOFT" 100, "WONK" 1;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 500;
    }

    /* --- Release card --- */
    .release {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--bg-soft);
      border: 1px solid var(--hairline);
      border-radius: 4px;
      text-decoration: none;
      color: inherit;
      margin-bottom: 48px;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .release:hover {
      border-color: var(--hairline-strong);
    }

    .release-art {
      width: 72px;
      height: 72px;
      background: #0F1512;
      border-radius: 2px;
      flex-shrink: 0;
      background-image: url('release-cover.jpg');
      background-size: cover;
      background-position: center;
    }

    .release-meta { flex: 1; min-width: 0; }

    .release-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .release-title {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .release-sub {
      font-size: 13px;
      color: var(--ink-muted);
    }

    .release-arrow {
      color: var(--ink-muted);
      font-size: 20px;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .release:hover .release-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* --- Link groups --- */
    .group { margin-bottom: 36px; }

    .group-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 500;
      margin-bottom: 4px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--hairline);
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid var(--hairline);
      color: var(--ink);
      text-decoration: none;
      font-size: 16px;
      font-weight: 400;
      transition: color 0.15s ease, padding-left 0.2s ease;
    }

    .link:hover {
      color: var(--accent);
      padding-left: 6px;
    }

    .link:hover .link-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    .link-arrow {
      color: var(--ink-muted);
      font-size: 14px;
      transition: transform 0.2s ease, color 0.15s ease;
    }

    /* --- Footer --- */
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--hairline);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* --- Accessibility & motion --- */
    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

    /* --- Release platform picker --- */
    button.release {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .platform-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      border: 1px solid var(--hairline-strong);
      border-radius: 4px;
      background: var(--bg-soft);
      color: var(--ink);
      padding: 0;
      width: min(320px, calc(100% - 48px));
    }

    .platform-dialog::backdrop {
      background: rgba(15, 21, 18, 0.7);
    }

    .platform-dialog-inner {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .platform-dialog-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .platform-option {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      color: var(--ink);
      text-decoration: none;
      font-size: 15px;
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    .platform-option:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .platform-dialog-close {
      margin-top: 4px;
      background: none;
      border: none;
      color: var(--ink-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 8px 0 0;
      text-align: left;
    }

    .platform-dialog-close:hover {
      color: var(--ink);
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1 class="name">Chandler <em>Sedat</em></h1>
      <p class="eyebrow">Musician · Denver, CO</p>
    </header>

    <!-- Latest release card. Update title/art with each release; platform links live in the dialog below. -->
    <button class="release" type="button" id="release-trigger" aria-haspopup="dialog">
      <div class="release-art" aria-hidden="true"></div>
      <div class="release-meta">
        <div class="release-label">New release</div>
        <div class="release-title">Chaos in Paradise</div>
        <div class="release-sub">Out now on all platforms</div>
      </div>
      <span class="release-arrow" aria-hidden="true">→</span>
    </button>

    <dialog class="platform-dialog" id="release-dialog">
      <div class="platform-dialog-inner">
        <p class="platform-dialog-title">Listen on</p>
        <a class="platform-option" href="https://open.spotify.com/track/3W0GhD7SJWn71XD21dLKTN?si=47f9b753cb3c47a2" target="_blank" rel="noopener">Spotify</a>
        <a class="platform-option" href="https://music.apple.com/us/album/chaos-in-paradise-single/6782432609" target="_blank" rel="noopener">Apple Music</a>
        <a class="platform-option" href="https://music.youtube.com/watch?v=uDR51O_WskE&si=ZCQgTRXWoy3aJNeq" target="_blank" rel="noopener">YouTube Music</a>
        <button class="platform-dialog-close" type="button">Cancel</button>
      </div>
    </dialog>

    <section class="group">
      <div class="group-label">Listen</div>
      <a class="link" href="https://open.spotify.com/artist/3IZI7WLG4aKnbdeHWkMkAE?si=gX2NCFniTHiYiHpQQbrr3w" target="_blank" rel="noopener">
        Spotify <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
      <a class="link" href="https://music.apple.com/us/artist/chandler-sedat/1509055538" target="_blank" rel="noopener">
        Apple Music <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
      <a class="link" href="https://music.youtube.com/channel/UCB8wkA1rCDcWPbowmawGr7g?si=d7eh4oqnY85NpJ1Z" target="_blank" rel="noopener">
        YouTube Music <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
    </section>

    <section class="group">
      <div class="group-label">Watch</div>
      <a class="link" href="#" target="_blank" rel="noopener">
        YouTube <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
    </section>

    <section class="group">
      <div class="group-label">Follow</div>
      <a class="link" href="https://www.instagram.com/seedat_music/?hl=en" target="_blank" rel="noopener">
        Instagram <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
      <a class="link" href="https://www.tiktok.com/@chansedat?lang=en" target="_blank" rel="noopener">
        TikTok <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
    </section>

    <footer>
      <span>© 2026 Chandler Sedat</span>
      <span>Denver, CO</span>
    </footer>
  </main>

  <script>
    var releaseTrigger = document.getElementById('release-trigger');
    var releaseDialog = document.getElementById('release-dialog');

    releaseTrigger.addEventListener('click', function () {
      releaseDialog.showModal();
    });

    releaseDialog.querySelector('.platform-dialog-close').addEventListener('click', function () {
      releaseDialog.close();
    });

    releaseDialog.addEventListener('click', function (event) {
      if (event.target === releaseDialog) releaseDialog.close();
    });

    releaseDialog.querySelectorAll('.platform-option').forEach(function (link) {
      link.addEventListener('click', function () {
        releaseDialog.close();
      });
    });
  </script>
</body>
</html>
